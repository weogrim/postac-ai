services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: postac-ai-app
    restart: no
    ports:
      - "${APP_PORT:-43080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www/html
    networks:
      - postacai

  postgres:
    image: pgvector/pgvector:pg16
    restart: no
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-43432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - postacai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: no
    ports:
      - "${FORWARD_REDIS_PORT:-43379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - postacai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    restart: no
    ports:
      - "${FORWARD_MAILPIT_SMTP_PORT:-43025}:1025"
      - "${FORWARD_MAILPIT_WEB_PORT:-43825}:8025"
    networks:
      - postacai

  adminer:
    image: adminer:latest
    restart: no
    ports:
      - "${FORWARD_ADMINER_PORT:-43081}:8080"
    depends_on:
      - postgres
    networks:
      - postacai

networks:
  postacai:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
