[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/run/supervisord.pid

[program:php-fpm]
command=php-fpm85 -F
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:cron]
command=supercronic /var/www/html/Docker/crontab
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/www/html/storage/logs/cron.log
stderr_logfile=/var/www/html/storage/logs/cron-error.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=false

[program:laravel-worker]
process_name=laravel-worker
directory=/var/www/html
command=php artisan queue:work
autostart=true
autorestart=true
startretries=3
numprocs=1
stdout_logfile=/var/www/html/storage/logs/worker.log
stderr_logfile=/var/www/html/storage/logs/worker-error.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=false
stdout_events_enabled=1
