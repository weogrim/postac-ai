[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:octane]
command=php /var/www/html/artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8080 --workers=auto --max-requests=500
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:cron]
command=supercronic /var/www/html/Docker/crontab
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/www/html/storage/logs/cron.log
stderr_logfile=/var/www/html/storage/logs/cron-error.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=false

[program:laravel-worker]
process_name=laravel-worker
directory=/var/www/html
command=php artisan queue:work
autostart=true
autorestart=true
startretries=3
numprocs=1
stdout_logfile=/var/www/html/storage/logs/worker.log
stderr_logfile=/var/www/html/storage/logs/worker-error.log
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=false
stdout_events_enabled=1
